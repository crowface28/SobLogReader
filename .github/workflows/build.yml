name: Build and Publish

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    name: Build & Publish Application
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore Dependencies
      run: dotnet restore

    - name: Publish Single-File Executable
      run: dotnet publish -c Release

    - name: Generate Artifact Attestation
      uses: actions/attest@v4
      with:
        subject-path: bin/Release/net10.0-windows/win-x64/publish/SobLogReader.exe

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SobLogReader-win-x64
        path: bin/Release/net10.0-windows/win-x64/publish/SobLogReader.exe
        if-no-files-found: error

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: bin/Release/net10.0-windows/win-x64/publish/SobLogReader.exe
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
